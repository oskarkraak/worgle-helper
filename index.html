<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worgle Helper</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Worgle Helper</h1>
        <p>Find all words in your 4x4 Worgle grid</p>
        <div class="lang-selector">
          <label for="lang-select">Dictionary:</label>
          <select id="lang-select">
            <option value="de">German</option>
            <option value="en">English (US)</option>
          </select>
        </div>
      </header>
      
      <main>
        <section class="grid-section">
          <div class="worgle-grid" id="worgle-grid">
            <!-- 16 inputs generated by JS -->
          </div>
          <div class="controls">
            <button id="clear-btn" class="btn secondary">Clear Board</button>
            <button id="solve-btn" class="btn primary">Solve</button>
          </div>
        </section>

        <section class="results-section">
          <div id="loading" class="hidden">Loading dictionary & solving...</div>
          <div id="results-container">
            <h2>Found Words (<span id="word-count">0</span>)</h2>
            <div id="word-list" class="word-list">
              <!-- Words will be injected here -->
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
